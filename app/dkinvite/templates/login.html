<!doctype html>
<html lang="ru">
<head>
  <meta charset="utf-8">
  <title>Вход</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <style>
    body { font-family: Arial, sans-serif; background: #f5f5f5; margin: 0; }
    .box { max-width: 420px; margin: 80px auto; background: #fff; border: 1px solid #ddd; border-radius: 10px; padding: 24px; }
    input, button { width: 100%; padding: 10px; margin-top: 10px; box-sizing: border-box; }
    button { cursor: pointer; }
    .error { color: #a10000; margin-top: 12px; }
  </style>
</head>
<body>
  <div class="box">
    <h1>Dkinvite v2</h1>
    <form method="post">
      <label>Логин</label>
      <input type="text" name="username" required>
      <label>Пароль</label>
      <input type="password" name="password" required>
      <button type="submit">Войти</button>
    </form>

    {% with messages = get_flashed_messages(with_categories=true) %}
      {% if messages %}
        {% for category, message in messages %}
          <div class="{{ category }}">{{ message }}</div>
        {% endfor %}
      {% endif %}
    {% endwith %}
  </div>
</body>
</html>
