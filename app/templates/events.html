{% extends "base.html" %}
{% block content %}
<style>
    .admin-panel { background: #fff; padding: 20px; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.05); margin-top: 10px; }
    table { width: 100%; border-collapse: collapse; margin-top: 20px; }
    th, td { padding: 15px; text-align: left; border-bottom: 1px solid #f0f2f5; }
    th { background: #fafafa; color: #8e8e93; font-size: 12px; text-transform: uppercase; letter-spacing: 1px; }
    .btn-circle { width: 34px; height: 34px; border-radius: 50%; display: inline-flex; align-items: center; justify-content: center; border: none; cursor: pointer; color: white; transition: 0.2s; }
    .btn-circle:active { transform: scale(0.9); }
</style>

<div class="admin-panel">
    <h3 style="margin-top:0; color:#2c3e50;">Добавить мероприятие</h3>
    <form method="POST" style="display:flex; gap:10px; flex-wrap:wrap;">
        <input type="text" name="name" placeholder="Название концерта" required style="flex:2; min-width:200px; padding:12px; border-radius:8px; border:1px solid #e2e8f0; font-size:14px;">
        <input type="date" name="date" required style="flex:1; min-width:150px; padding:12px; border-radius:8px; border:1px solid #e2e8f0; font-size:14px;">
        <button type="submit" class="btn btn-success" style="padding:12px 25px; border-radius:8px; font-size:14px;">Создать</button>
    </form>

    <h3 style="margin-top:40px; color:#2c3e50;">Список мероприятий</h3>
    <div style="overflow-x:auto;">
        <table>
            <tr>
                <th>Название</th>
                <th>Дата</th>
                <th style="text-align:right;">Действие</th>
            </tr>
            {% for ev in events %}
            <tr>
                <td><strong>{{ ev.name }}</strong></td>
                <td style="color:#8e8e93; font-weight:bold;">{{ ev.event_date }}</td>
                <td style="text-align:right;">
                    <form method="POST" style="display:inline;">
                        <input type="hidden" name="delete" value="{{ ev.id }}">
                        <button type="submit" class="btn-circle" style="background:#ff3b30;" onclick="return confirm('Удалить мероприятие из списка?')" title="Удалить">
                            <i class="fa-solid fa-trash-can"></i>
                        </button>
                    </form>
                </td>
            </tr>
            {% endfor %}
        </table>
    </div>
</div>
{% endblock %}
